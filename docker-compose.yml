services:
  backend:
    build: .
    image: currency-conv:dev
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
